services:
  - type: web
    name: reels-maker-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      # Секреты задайте вручную в Render Dashboard:
      # GROQ_API_KEY — обязателен
      # S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY / S3_BUCKET_NAME (+ опционально
      #   S3_ENDPOINT_URL / S3_REGION, по умолчанию — Yandex Object Storage) —
      #   опционально, для прямой загрузки больших файлов в обход лимитов Render-прокси
      - key: GROQ_API_KEY
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
